name: Manual OIDC Token Test - AWS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve OIDC Token for AWS
        run: |
          TOKEN_RESPONSE=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com")

          echo $TOKEN_RESPONSE | jq -r '.value' > token.txt

      - name: Upload token
        uses: actions/upload-artifact@v4
        with:
          name: oidc-token
          path: token.txt
