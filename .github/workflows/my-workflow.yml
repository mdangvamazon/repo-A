name: Debug OIDC Claims

on:
  workflow_dispatch:   # This allows you to trigger it MANUALLY from GitHub UI

permissions:
  id-token: write   # Required for requesting the JWT
  contents: read

jobs:
  debug-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Debug OIDC Claims
        uses: github/actions-oidc-debugger@main
